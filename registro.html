<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registro · Flores Mobiliario</title><link rel="preconnect" href="https://cdn.jsdelivr.net"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('registro')</script><main class="container my-5"><div class="row justify-content-center"><div class="col-lg-7"><div class="card-pro p-4"><h1 class="section-title h2">Registro de cliente</h1><p class="text-muted">Tus datos se guardan en LocalStorage para asociarlos con cotizaciones.</p><form id="f" class="row g-3"><div class="col-md-6"><label class="required">Nombre</label><input id="nombre" class="form-control" required></div><div class="col-md-6"><label class="required">Teléfono</label><input id="telefono" class="form-control" required></div><div class="col-md-6"><label class="required">Correo</label><input id="correo" type="email" class="form-control" required></div><div class="col-md-6"><label class="required">Contraseña</label><input id="password" type="password" class="form-control" required></div><div class="col-12"><label>Dirección</label><input id="direccion" class="form-control"></div><div class="col-12"><button class="btn btn-brand btn-lg">Crear cuenta</button></div></form></div></div></div></main><script>f.onsubmit=e=>{e.preventDefault();let a=get(DB.clientes);if(a.some(x=>x.correo===correo.value.trim()))return alert('Ese correo ya existe');let c={id:nextId(DB.clientes),nombre:nombre.value.trim(),telefono:telefono.value.trim(),correo:correo.value.trim(),direccion:direccion.value.trim(),password:password.value};a.push(c);set(DB.clientes,a);localStorage.setItem(DB.sesion,JSON.stringify({tipo:'cliente',id:c.id,nombre:c.nombre,correo:c.correo}));location.href='perfil.html'}</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
