<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Perfil · Flores Mobiliario</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('perfil')</script><script>requireLogin()</script><main class="container my-5"><div class="row g-4"><div class="col-lg-4"><div class="card-pro p-4"><h1 class="h3">Mi perfil</h1><div id="info"></div><a class="btn btn-brand w-100" href="cotizacion.html">Nueva cotización</a></div></div><div class="col-lg-8"><div class="card-pro p-4"><h3>Mis cotizaciones</h3><div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>Fecha</th><th>Total</th><th>Detalle</th></tr></thead><tbody id="tb"></tbody></table></div></div></div></div></main><script>const s=sesion();info.innerHTML=`<p><b>Nombre:</b> ${s.nombre}</p><p><b>Correo:</b> ${s.correo||''}</p><p><b>Tipo:</b> ${s.tipo}</p>`;const det=get(DB.detalles),prods=get(DB.productos);let arr=get(DB.cotizaciones).filter(c=>s.tipo==='admin'||c.id_cliente===s.id);tb.innerHTML=arr.length?arr.map(c=>{let ds=det.filter(d=>d.id_cotizacion===c.id).map(d=>`${one(DB.productos,d.id_producto)?.nombre||'Producto'} (${d.cantidad})`).join(', ');return `<tr><td>#${c.id}</td><td>${c.fecha}</td><td>${money(c.total)}</td><td>${ds}</td></tr>`}).join(''):`<tr><td colspan="4" class="text-center text-muted py-4">No tienes cotizaciones guardadas.</td></tr>`</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
