<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catálogo · Flores Mobiliario</title><link rel="preconnect" href="https://cdn.jsdelivr.net"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('productos')</script><header class="page-head"><div class="container"><p class="eyebrow text-dark">Catálogo</p><h1 class="section-title">Muebles para espacios de trabajo</h1><p class="lead text-muted">Explora productos con stock, categoría, medidas, colores y precios listos para cotizar.</p></div></header><main class="container my-5"><div class="card-pro p-4 mb-4"><div class="row g-3"><div class="col-md-5"><input id="buscar" class="form-control" placeholder="Buscar por nombre, color o medida"></div><div class="col-md-4"><select id="cat" class="form-select"><option value="">Todas las categorías</option></select></div><div class="col-md-3"><select id="orden" class="form-select"><option value="nombre">Ordenar por nombre</option><option value="precio">Menor precio</option><option value="stock">Mayor stock</option></select></div></div></div><div id="lista" class="row g-4"></div></main><script>const cm=catsMap();get(DB.categorias).forEach(c=>cat.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`);function render(){const q=buscar.value.toLowerCase(),c=cat.value,o=orden.value;let arr=get(DB.productos).filter(p=>(!c||p.id_categoria==c)&&(`${p.nombre} ${p.color} ${p.medida}`.toLowerCase().includes(q)));arr.sort((a,b)=>o==='precio'?a.precio-b.precio:o==='stock'?b.stock-a.stock:a.nombre.localeCompare(b.nombre));lista.innerHTML=arr.length?arr.map(p=>`<div class="col-lg-4 col-md-6"><div class="card-pro product-card h-100"><img class="product-img" src="${p.imagen}" alt="${p.nombre}"><div class="p-4"><div class="d-flex justify-content-between"><span class="badge badge-soft">${cm[p.id_categoria]}</span><span class="badge ${p.stock>0?'text-bg-success':'text-bg-danger'}">Stock ${p.stock}</span></div><h4 class="mt-3">${p.nombre}</h4><p class="text-muted">${p.descripcion||''}</p><p class="mb-1"><b>Color:</b> ${p.color}</p><p class="mb-1"><b>Medida:</b> ${p.medida}</p><h3 class="price my-3">${money(p.precio)}</h3><button class="btn btn-brand w-100" ${p.stock<=0?'disabled':''} onclick="addCart(${p.id});location.href='cotizacion.html'">Agregar a cotización</button></div></div></div>`).join(''):`<div class="empty">No se encontraron productos.</div>`}buscar.oninput=render;cat.onchange=render;orden.onchange=render;render()</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
