<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cotización · Flores Mobiliario</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('cotizacion')</script><script>requireLogin()</script><header class="page-head"><div class="container"><p class="eyebrow text-dark">Cotizador</p><h1 class="section-title">Crear cotización</h1><p class="lead text-muted">Selecciona productos, cantidades y genera el detalle con total.</p></div></header><main class="container my-5"><div class="row g-4"><div class="col-lg-5"><div class="card-pro p-4"><h4>Agregar producto</h4><select id="prod" class="form-select mb-3"></select><div class="row g-2"><div class="col-5"><input id="qty" type="number" min="1" value="1" class="form-control"></div><div class="col-7"><button class="btn btn-brand w-100" onclick="add()">Agregar</button></div></div><hr><h5>Datos</h5><div id="datos"></div></div></div><div class="col-lg-7"><div class="quote-box"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Detalle de cotización</h4><button class="btn btn-sm btn-outline-danger" onclick="set(DB.carrito,[]);render()">Limpiar</button></div><div class="table-responsive"><table class="table"><thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th><th></th></tr></thead><tbody id="tb"></tbody></table></div><div class="d-flex justify-content-between align-items-center border-top pt-3"><h3>Total</h3><h2 id="total" class="price"></h2></div><button class="btn btn-brand btn-lg w-100 mt-3" onclick="guardar()">Guardar cotización</button></div></div></div></main><script>get(DB.productos).forEach(p=>prod.innerHTML+=`<option value="${p.id}">${p.nombre} · ${money(p.precio)} · Stock ${p.stock}</option>`);const s=sesion();datos.innerHTML=`<p><b>Usuario:</b> ${s.nombre}</p><p><b>Fecha:</b> ${today()}</p><p><b>Almacenamiento:</b> LocalStorage</p>`;const url=new URLSearchParams(location.search);if(url.get('producto')){addCart(Number(url.get('producto')),1)}function add(){addCart(Number(prod.value),Number(qty.value||1));render()}function render(){let car=get(DB.carrito);let rows='',sum=0;car.forEach((it,i)=>{const p=one(DB.productos,it.id_producto);if(!p)return;const sub=p.precio*it.cantidad;sum+=sub;rows+=`<tr><td><img class="thumb me-2" src="${p.imagen}">${p.nombre}</td><td><input type="number" min="1" value="${it.cantidad}" class="form-control form-control-sm" style="width:80px" onchange="upd(${i},this.value)"></td><td>${money(p.precio)}</td><td>${money(sub)}</td><td><button class="btn btn-sm btn-outline-danger" onclick="del(${i})">×</button></td></tr>`});tb.innerHTML=rows||`<tr><td colspan="5" class="text-center text-muted py-4">Aún no hay productos.</td></tr>`;total.textContent=money(sum)}function upd(i,v){let c=get(DB.carrito);c[i].cantidad=Math.max(1,Number(v));set(DB.carrito,c);render()}function del(i){let c=get(DB.carrito);c.splice(i,1);set(DB.carrito,c);render()}function guardar(){const c=get(DB.carrito);if(!c.length)return alert('Agrega productos.');let cot=get(DB.cotizaciones),det=get(DB.detalles),prods=get(DB.productos);const id=nextId(DB.cotizaciones);let total=0;c.forEach(it=>{const p=prods.find(x=>x.id==it.id_producto);if(p)total+=p.precio*it.cantidad});cot.push({id,fecha:today(),total,id_cliente:s.tipo==='cliente'?s.id:null,id_administrador:s.tipo==='admin'?s.id:1});c.forEach(it=>{const p=prods.find(x=>x.id==it.id_producto);if(!p)return;det.push({id:nextId(DB.detalles)+det.length,id_cotizacion:id,id_producto:p.id,cantidad:it.cantidad,precio_unitario:p.precio,subtotal:p.precio*it.cantidad});p.stock=Math.max(0,p.stock-it.cantidad)});set(DB.cotizaciones,cot);set(DB.detalles,det);set(DB.productos,prods);set(DB.carrito,[]);alert('Cotización guardada correctamente.');location.href='perfil.html'}render()</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
