<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar · Flores Mobiliario</title><link rel="preconnect" href="https://cdn.jsdelivr.net"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('login')</script><main class="container my-5"><div class="row justify-content-center"><div class="col-lg-5"><div class="card-pro p-4"><h1 class="section-title h2">Iniciar sesión</h1><p class="text-muted">Admin: admin@flores.com / admin123</p><form id="f"><label class="required">Correo o usuario</label><input id="u" class="form-control mb-3" required><label class="required">Contraseña</label><input id="p" type="password" class="form-control mb-3" required><button class="btn btn-brand w-100 btn-lg">Entrar</button></form><hr><a href="registro.html">Crear cuenta de cliente</a></div></div></div></main><script>f.onsubmit=e=>{e.preventDefault();const user=u.value.trim(),pass=p.value;const adm=get(DB.administradores).find(a=>(a.correo===user||a.usuario===user)&&a.password===pass);if(adm){localStorage.setItem(DB.sesion,JSON.stringify({tipo:'admin',id:adm.id,nombre:adm.nombre,correo:adm.correo}));location.href='admin.html';return}const cli=get(DB.clientes).find(c=>c.correo===user&&c.password===pass);if(cli){localStorage.setItem(DB.sesion,JSON.stringify({tipo:'cliente',id:cli.id,nombre:cli.nombre,correo:cli.correo}));location.href='perfil.html';return}alert('Datos incorrectos')}</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
