<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reportes · Flores Mobiliario</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('reportes')</script><script>requireAdmin()</script><header class="page-head"><div class="container"><p class="eyebrow text-dark">Reportes</p><h1 class="section-title">Resumen de operación</h1></div></header><main class="container my-5"><div class="row g-4 mb-4" id="stats"></div><div class="row g-4"><div class="col-lg-7"><div class="card-pro p-4"><h3>Cotizaciones</h3><div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Total</th></tr></thead><tbody id="cot"></tbody></table></div></div></div><div class="col-lg-5"><div class="card-pro p-4"><h3>Inventario bajo</h3><div id="stock"></div></div></div></div></main><script>const total=get(DB.cotizaciones).reduce((s,x)=>s+Number(x.total),0);stats.innerHTML=[['Productos',get(DB.productos).length],['Clientes',get(DB.clientes).length],['Cotizaciones',get(DB.cotizaciones).length],['Importe cotizado',money(total)]].map(x=>`<div class="col-md-3"><div class="card-pro stat"><div class="text-muted">${x[0]}</div><div class="num">${x[1]}</div></div></div>`).join('');cot.innerHTML=get(DB.cotizaciones).map(c=>`<tr><td>#${c.id}</td><td>${c.fecha}</td><td>${one(DB.clientes,c.id_cliente)?.nombre||'Mostrador/Admin'}</td><td>${money(c.total)}</td></tr>`).join('')||`<tr><td colspan="4" class="text-center text-muted py-4">Sin cotizaciones.</td></tr>`;let low=get(DB.productos).filter(p=>p.stock<=5);stock.innerHTML=low.length?low.map(p=>`<div class="d-flex align-items-center gap-3 border-bottom py-3"><img class="thumb" src="${p.imagen}"><div><b>${p.nombre}</b><br><small>Stock: ${p.stock}</small></div></div>`).join(''):'<div class="empty">No hay productos con inventario bajo.</div>'</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
