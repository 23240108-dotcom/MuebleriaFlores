<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel · Flores Mobiliario</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/estilos.css"><script src="js/app.js"></script></head><body><script>nav('admin')</script><script>requireAdmin()</script><header class="page-head"><div class="container"><p class="eyebrow text-dark">Administración</p><h1 class="section-title">Panel de gestión</h1><p class="lead text-muted">CRUD conectado a LocalStorage con la estructura del diagrama ER.</p></div></header><main class="container my-5"><div class="row g-4 mb-4" id="stats"></div><div class="admin-layout"><aside class="side"><div class="list-group"><button class="list-group-item active" onclick="section('productos',this)">Productos</button><button class="list-group-item" onclick="section('categorias',this)">Categorías</button><button class="list-group-item" onclick="section('clientes',this)">Clientes</button><button class="list-group-item" onclick="section('proveedores',this)">Proveedores</button><button class="list-group-item" onclick="section('admins',this)">Administradores</button><button class="list-group-item" onclick="section('relaciones',this)">Producto-Proveedor</button></div></aside><section class="card-pro p-4"><div id="panel"></div></section></div></main><script>
function refreshStats(){stats.innerHTML=[['Productos',get(DB.productos).length],['Clientes',get(DB.clientes).length],['Proveedores',get(DB.proveedores).length],['Cotizaciones',get(DB.cotizaciones).length]].map(x=>`<div class="col-md-3"><div class="card-pro stat"><div class="text-muted">${x[0]}</div><div class="num">${x[1]}</div></div></div>`).join('')}
function section(name,btn){document.querySelectorAll('.list-group-item').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');window['sec_'+name]();refreshStats()}
function table(headers,rows){return `<div class="table-responsive"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows||'<tr><td colspan="99" class="text-center text-muted py-4">Sin registros.</td></tr>'}</tbody></table></div>`}
function sec_productos(){const cm=catsMap();panel.innerHTML=`<div class="d-flex justify-content-between mb-3"><h3>Productos</h3><button class="btn btn-brand" onclick="formProducto()">Nuevo producto</button></div>`+table(['Imagen','Nombre','Categoría','Precio','Stock','Acciones'],get(DB.productos).map(p=>`<tr><td><img class="thumb" src="${p.imagen}"></td><td>${p.nombre}<br><small>${p.color} · ${p.medida}</small></td><td>${cm[p.id_categoria]||''}</td><td>${money(p.precio)}</td><td>${p.stock}</td><td><button class="btn btn-sm btn-outline-brand" onclick="formProducto(${p.id})">Editar</button> <button class="btn btn-sm btn-outline-danger" onclick="delItem(DB.productos,${p.id});sec_productos()">Borrar</button></td></tr>`).join(''))}
function formProducto(id){const p=id?one(DB.productos,id):{id:'',nombre:'',color:'',precio:'',medida:'',stock:'',id_categoria:1,imagen:'escritorio.jpg',descripcion:''};panel.innerHTML=`<h3>${id?'Editar':'Nuevo'} producto</h3><form id="fp" class="row g-3"><div class="col-md-6"><label>Nombre</label><input id="nombre" class="form-control" value="${p.nombre}" required></div><div class="col-md-3"><label>Color</label><input id="color" class="form-control" value="${p.color}" required></div><div class="col-md-3"><label>Precio</label><input id="precio" type="number" class="form-control" value="${p.precio}" required></div><div class="col-md-4"><label>Medida</label><input id="medida" class="form-control" value="${p.medida}" required></div><div class="col-md-2"><label>Stock</label><input id="stock" type="number" class="form-control" value="${p.stock}" required></div><div class="col-md-3"><label>Categoría</label><select id="categoria" class="form-select">${get(DB.categorias).map(c=>`<option value="${c.id}" ${p.id_categoria==c.id?'selected':''}>${c.nombre}</option>`)}</select></div><div class="col-md-3"><label>Imagen</label><select id="imagen" class="form-select">${imgs.map(im=>`<option ${p.imagen==im?'selected':''}>${im}</option>`)}</select></div><div class="col-12"><label>Descripción</label><textarea id="descripcion" class="form-control">${p.descripcion||''}</textarea></div><div class="col-12"><button class="btn btn-brand">Guardar</button> <button type="button" class="btn btn-outline-secondary" onclick="sec_productos()">Cancelar</button></div></form>`;fp.onsubmit=e=>{e.preventDefault();let arr=get(DB.productos);let obj={id:id||nextId(DB.productos),nombre:nombre.value,color:color.value,precio:Number(precio.value),medida:medida.value,stock:Number(stock.value),id_categoria:Number(categoria.value),imagen:imagen.value,descripcion:descripcion.value};id?arr[arr.findIndex(x=>x.id==id)]=obj:arr.push(obj);set(DB.productos,arr);sec_productos()}}
function simpleSec(title,key,fields){panel.innerHTML=`<div class="d-flex justify-content-between mb-3"><h3>${title}</h3><button class="btn btn-brand" onclick="simpleForm('${title}','${key}')">Nuevo</button></div>`+table(['ID',...fields,'Acciones'],get(DB[key]).map(x=>`<tr><td>${x.id}</td>${fields.map(f=>`<td>${x[f]||''}</td>`).join('')}<td><button class="btn btn-sm btn-outline-brand" onclick="simpleForm('${title}','${key}',${x.id})">Editar</button> <button class="btn btn-sm btn-outline-danger" onclick="delItem(DB.${key},${x.id});section('${key==='administradores'?'admins':key}')">Borrar</button></td></tr>`).join(''))}
function simpleForm(title,key,id){const fields={categorias:['nombre'],clientes:['nombre','telefono','correo','direccion'],proveedores:['nombre','telefono','correo','direccion','ciudad','pais','estado'],administradores:['nombre','usuario','correo','password','rol']}[key];const x=id?one(DB[key],id):Object.fromEntries(fields.map(f=>[f,'']));panel.innerHTML=`<h3>${id?'Editar':'Nuevo'} ${title}</h3><form id="sf" class="row g-3">${fields.map(f=>`<div class="col-md-6"><label>${f}</label><input id="f_${f}" class="form-control" value="${x[f]||''}" ${f==='password'?'type="password"':''}></div>`).join('')}<div class="col-12"><button class="btn btn-brand">Guardar</button></div></form>`;sf.onsubmit=e=>{e.preventDefault();let arr=get(DB[key]);let obj={id:id||nextId(DB[key])};fields.forEach(f=>obj[f]=document.getElementById('f_'+f).value);id?arr[arr.findIndex(y=>y.id==id)]=obj:arr.push(obj);set(DB[key],arr);section(key==='administradores'?'admins':key)}}
function delItem(key,id){if(confirm('¿Eliminar registro?'))set(key,get(key).filter(x=>x.id!=id))}
function sec_categorias(){simpleSec('Categorías','categorias',['nombre'])}function sec_clientes(){simpleSec('Clientes','clientes',['nombre','telefono','correo','direccion'])}function sec_proveedores(){simpleSec('Proveedores','proveedores',['nombre','telefono','correo','ciudad','estado'])}function sec_admins(){simpleSec('Administradores','administradores',['nombre','usuario','correo','rol'])}
function sec_relaciones(){const ps=get(DB.productos),pr=get(DB.proveedores);panel.innerHTML=`<h3>Producto-Proveedor</h3><form id="fr" class="row g-3 mb-4"><div class="col-md-3"><select id="proveedor" class="form-select">${pr.map(x=>`<option value="${x.id}">${x.nombre}</option>`)}</select></div><div class="col-md-3"><select id="producto" class="form-select">${ps.map(x=>`<option value="${x.id}">${x.nombre}</option>`)}</select></div><div class="col-md-2"><input id="pc" type="number" class="form-control" placeholder="Precio compra"></div><div class="col-md-2"><input id="te" type="number" class="form-control" placeholder="Días entrega"></div><div class="col-md-2"><button class="btn btn-brand w-100">Agregar</button></div></form>`+table(['Proveedor','Producto','Precio compra','Entrega'],get(DB.productoProveedor).map(r=>`<tr><td>${one(DB.proveedores,r.id_proveedor)?.nombre||''}</td><td>${one(DB.productos,r.id_producto)?.nombre||''}</td><td>${money(r.precio_compra)}</td><td>${r.tiempo_entrega} días</td></tr>`).join(''));fr.onsubmit=e=>{e.preventDefault();let a=get(DB.productoProveedor);a.push({id_proveedor:Number(proveedor.value),id_producto:Number(producto.value),precio_compra:Number(pc.value),tiempo_entrega:Number(te.value)});set(DB.productoProveedor,a);sec_relaciones()}}
refreshStats();sec_productos();
</script><script>footer()</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
